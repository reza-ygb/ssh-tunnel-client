name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Test SSH Tunnel Client syntax
      run: |
        python -m py_compile ssh_tunnel_client.py
    
    - name: Check installer script
      run: |
        # Test run.sh syntax (pure shell script)
        bash -n run.sh
        # Test shell portion of one_line_installer.sh (mixed shell/python file)
        head -61 one_line_installer.sh | bash -n

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    
    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety
    
    - name: Run security checks with bandit
      run: |
        bandit -r . -f json -o bandit-report.json || true
    
    - name: Check dependencies for vulnerabilities
      run: |
        safety check --json --output safety-report.json || true
    
    - name: Upload security reports
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json

  compatibility:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        distro: [ubuntu:20.04, ubuntu:22.04, ubuntu:24.04, debian:11, debian:12]
    
    container:
      image: ${{ matrix.distro }}
    
    steps:
    - name: Install git and basic tools
      run: |
        apt-get update
        apt-get install -y git python3 python3-pip curl wget
    
    - uses: actions/checkout@v4
    
    - name: Test installer script
      run: |
        chmod +x one_line_installer.sh
        # Test script syntax without actually installing
        head -61 one_line_installer.sh | bash -n
    
    - name: Test application dependencies
      run: |
        python3 -c "import tkinter; print('tkinter OK')"
        python3 -c "import sys; print(f'Python {sys.version}')"
